name: UI Service CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
    id-token: write
    contents: write

env:
    IMAGE_NAME: UI-service

jobs:
    build-test-scan-deploy:
        runs-on: ubuntu-latest


        steps: 
  # ----------------------------
  # Checkout
  # ----------------------------
            - name: Checkout
              uses: actions/checkout@v4

  # ----------------------------
  # Gitleaks
  # ----------------------------
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
  # ----------------------------
  # Setup Go
  # ----------------------------
            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: "21"

            - name: Make Maven Wrapper Executable
              run: chmod +x mvnw

            - name: Build Application
              run: ./mvnw clean package -DskipTests

            # ----------------------------
            # Unit Tests
            # ----------------------------
            
            # ----------------------------
            # SonarQube Scan
            # ----------------------------
            

            # ----------------------------
            # AWS Authentication (OIDC)
            # ----------------------------
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: ${{ vars.AWS_REGION }}

            # ----------------------------
            # ECR Login
            # ----------------------------
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            # ----------------------------
            # Docker Build
            # ----------------------------
            - name: Build Docker Image
              run: |
                docker build \
                  -t ${IMAGE_NAME}:${GITHUB_SHA} .

            # ----------------------------
            # Trivy Scan
            # ---------------------------
            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: ${{env.IMAGE_NAME}}:${{ github.sha }}
                severity: CRITICAL
                exit-code: 1
                ignore-unfixed: true

            # ----------------------------
            # Tag Image
            # ----------------------------
            - name: Tag Docker Image
              run: |
                docker tag \
                ${{env.IMAGE_NAME}}:${{ github.sha }} \
                ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${GITHUB_SHA}

            # ----------------------------
            # Push ECR
            # ----------------------------
            - name: Push Docker Image
              run: |
                docker push \
                ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${GITHUB_SHA}

            # ----------------------------
            # Clone GitOps Repository
            # ----------------------------
            - name: Clone GitOps Repo
              run: |
                git clone \
                https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/Ingress-Q/gitops-platform.git

            # ----------------------------
            # Update Helm Values
            # ----------------------------
            - name: Update Image Tag
              run: |
                sed -i "s/tag:.*/tag: ${GITHUB_SHA}/" \
                gitops-platform/environments/dev/ui-service-values.yaml

            # ----------------------------
            # Commit GitOps Change                                                                                                                      
            - name: Commit and Push GitOps Change
              env:
                GITHUB_TOKEN: ${{ secrets.GITOPS_TOKEN }}
              run: |
                cd gitops-platform

                git config user.email "gitops-bot@company.com"
                git config user.name "gitops-bot"

                git add .

                git commit -m "chore(ui): update image tag to ${GITHUB_SHA}" || true
                git remote set-url origin \
                https://x-access-token:${GITHUB_TOKEN}@github.com/Ingress-Q/gitops-platform.git
                git push origin main
          
            
